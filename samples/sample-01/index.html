      margin-bottom: 20px;

      background: #1e293b;

      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,.06);
    }
    .card-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .08em;

    }
    .row { display: flex; gap: 12px; }
    .stat {

      background: #243044;

    }
    .stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; }
    .stat-value { font-size: 1.4rem; font-weight: 700; margin-top: 6px; color: #38bdf8; }
    .stat-unit { font-size: 11px; color: #64748b; }
    .aqi-band {
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 999px;
      display: inline-block;
      font-weight: 700;
      font-size: 14px;
      background: rgba(34,197,94,.15);
      color: #22c55e;
    }
    .refresh-btn {
      display: block;
      margin: 16px auto 0;
      background: transparent;
      border: 1px solid rgba(56,189,248,.3);
      color: #38bdf8;
      padding: 8px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
    }
    .refresh-btn:hover { background: rgba(56,189,248,.1); }
    .updated { text-align: center; font-size: 12px; color: #64748b; margin-top: 10px; }
  </style>
</head>
