    * { margin:0; padding:0; box-sizing:border-box; }
    body {

    .widget-title {
      text-align: center;

      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 20px;
    }
    .coin-card {
      background: #1e293b;

      padding: 20px 24px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .coin-name { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; }
    .coin-symbol { font-size: 20px; font-weight: 800; margin-top: 2px; }
    .coin-price { font-size: 1.6rem; font-weight: 700; color: #f8fafc; }
    .coin-change {
      font-size: 14px;
      font-weight: 700;
      margin-top: 4px;
      text-align: right;
    }
    .coin-change.positive { color: #22c55e; }
    .coin-change.negative { color: #ef4444; }
    .coin-mcap { font-size: 11px; color: #64748b; margin-top: 4px; text-align: right; }
    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }
    .updated { font-size: 12px; color: #64748b; }
    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(56,189,248,.3);
      color: #38bdf8;
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
    }
    .refresh-btn:hover { background: rgba(56,189,248,.1); }
