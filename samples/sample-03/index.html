<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>GitHub Stats Card</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .widget { width: 100%; max-width: 480px; }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid rgba(255,255,255,.06);
    }
    .repo-header { margin-bottom: 20px; }
    .repo-name { font-size: 1.2rem; font-weight: 800; color: #38bdf8; }
    .repo-desc { font-size: 13px; color: #94a3b8; margin-top: 6px; line-height: 1.5; }
    .stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .stat {
      flex: 1;
      background: #243044;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }
    .stat-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .06em; }
    .stat-value { font-size: 1.3rem; font-weight: 700; margin-top: 6px; color: #e2e8f0; }
    .meta-row { display: flex; gap: 16px; font-size: 13px; color: #94a3b8; }
    .lang-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #15803D;
      display: inline-block;
      margin-right: 6px;
    }
    .last-commit { font-size: 12px; color: #64748b; margin-top: 12px; }
    .top-contributor { font-size: 12px; color: #64748b; margin-top: 6px; }
    .refresh-btn {
      display: block;
      margin: 20px auto 0;
      background: transparent;
      border: 1px solid rgba(56,189,248,.3);
      color: #38bdf8;
      padding: 8px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
    }
    .refresh-btn:hover { background: rgba(56,189,248,.1); }
